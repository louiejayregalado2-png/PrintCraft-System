<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print & Craft Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">

        <h3 class="logo">
            <i class="fa-solid fa-store"></i>
            Print & Craft
        </h3>

        <ul>

            <li class="active">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-cart-shopping"></i>
                Orders
            </li>

            <li>
                <i class="fa-solid fa-box"></i>
                Inventory
            </li>

            <li>
                <i class="fa-solid fa-users"></i>
                Customers
            </li>

            <li>
                <i class="fa-solid fa-chart-line"></i>
                Reports
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                Settings
            </li>

        </ul>

    </div>

    <!-- Main Content -->
    <div class="content">

        <h2>Dashboard</h2>

        <div class="row">

            <div class="col-md-3">
                <div class="card-box">
                    <h3>₱0</h3>
                    <p>Today's Sales</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h3>0</h3>
                    <p>Pending Orders</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h3>0</h3>
                    <p>Total Products</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h3>0</h3>
                    <p>Low Stock</p>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
